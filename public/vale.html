<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tu Vale QR - Restaurantes</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎁</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px;">

    <!-- Loading State -->
    <div id="loader" class="text-center">
        <div class="loader" style="margin: 0 auto 16px;"></div>
        <p style="color: var(--text-secondary); font-size: 0.9rem;">Cargando tu vale...</p>
    </div>

    <!-- Error State -->
    <div id="error-view" class="hidden text-center glass-card" style="padding: 40px; max-width: 400px; width: 100%;">
        <div style="font-size: 3rem; margin-bottom: 16px;">🛑</div>
        <h2 style="font-family: var(--font-heading); font-size: 1.5rem; color: var(--error); margin-bottom: 8px;">Vale Inválido</h2>
        <p id="error-msg" style="color: var(--text-secondary); font-size: 0.9rem;">No se pudo encontrar el vale solicitado.</p>
    </div>

    <!-- Voucher Details -->
    <div id="voucher-view" class="hidden glass-card text-center" style="padding: 40px 24px; max-width: 400px; width: 100%; position: relative; overflow: hidden;">
        <!-- Top decorative border -->
        <div style="position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--premium-accent), var(--orange-400));"></div>
        
        <h1 style="font-family: var(--font-heading); font-size: 1.8rem; font-weight: 800; margin-bottom: 8px;">¡Hola, <span id="v-recipient" class="premium-gradient-text"></span>!</h1>
        <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 24px;">Has recibido un vale de <strong id="v-company" style="color: white;">Empresa</strong></p>

        <div style="background: rgba(0,0,0,0.4); border-radius: 16px; padding: 20px; margin-bottom: 32px; border: 1px solid var(--border-medium);">
            <p style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-tertiary); margin-bottom: 4px;">Saldo Disponible</p>
            <h2 id="v-balance" style="font-family: var(--font-heading); font-size: 3rem; color: var(--success); font-weight: 800; line-height: 1;">$0.00</h2>
            <p style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 12px;">Vence el: <span id="v-expiry" style="color: white; font-weight: 600;">--/--/----</span></p>
        </div>

        <div id="qr-display" style="background: white; padding: 20px; border-radius: 20px; display: inline-block; margin-bottom: 32px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
            <!-- QR goes here -->
        </div>

        <p style="font-size: 0.85rem; color: var(--text-tertiary); line-height: 1.5;">Presenta este código QR<br>al momento de pagar en caja.</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const voucherId = urlParams.get('id');

            const loader = document.getElementById('loader');
            const errorView = document.getElementById('error-view');
            const voucherView = document.getElementById('voucher-view');
            const errorMsg = document.getElementById('error-msg');

            if (!voucherId) {
                loader.classList.add('hidden');
                errorMsg.textContent = "El enlace no contiene un vale válido.";
                errorView.classList.remove('hidden');
                return;
            }

            try {
                const res = await fetch(`/api/public/voucher/${voucherId}`).then(r => r.json());
                
                loader.classList.add('hidden');

                if (res.success && res.voucher) {
                    const v = res.voucher;
                    
                    document.getElementById('v-recipient').textContent = v.recipient_name ? v.recipient_name.split(' ')[0] : 'Empleado';
                    document.getElementById('v-company').textContent = v.issuing_company_name;
                    
                    const isUsed = Number(v.current_value) <= 0;
                    document.getElementById('v-balance').textContent = `$${Number(v.current_value).toFixed(2)}`;
                    
                    if (isUsed) {
                        document.getElementById('v-balance').style.color = 'var(--text-tertiary)';
                        document.getElementById('qr-display').innerHTML = '<p style="color: black; font-weight: bold; margin: 40px 0;">Vale Agotado</p>';
                    } else if (!v.is_active) {
                        document.getElementById('v-balance').style.color = 'var(--error)';
                        document.getElementById('qr-display').innerHTML = '<p style="color: black; font-weight: bold; margin: 40px 0;">Vale Inactivo</p>';
                    } else {
                        const qr = qrcode(0, 'H');
                        qr.addData(v.qr_payload);
                        qr.make();
                        document.getElementById('qr-display').innerHTML = qr.createImgTag(8);
                    }
                    
                    document.getElementById('v-expiry').textContent = new Date(v.expiry_date).toLocaleDateString();
                    
                    voucherView.classList.remove('hidden');
                } else {
                    errorMsg.textContent = res.error || "No pudimos encontrar este vale.";
                    errorView.classList.remove('hidden');
                }
            } catch (err) {
                loader.classList.add('hidden');
                errorMsg.textContent = "Hubo un error al conectar con el servidor.";
                errorView.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
