<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Sistema de Canje de Vales — Restaurantes El Salvador">
  <meta name="theme-color" content="#C62828">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://web-production-c8dbf.up.railway.app https://cdn.jsdelivr.net;">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Restaurantes — Canje de Vales</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎟️</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .nav-bar {
      display: flex;
      justify-content: space-around;
      background: rgba(10, 10, 10, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: var(--space-sm);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
      height: 70px;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.4);
      background: none;
      border: none;
      padding: 8px;
      transition: all 0.3s ease;
      font-family: var(--font-heading);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .nav-item.active {
      color: var(--premium-accent);
    }

    .nav-item svg {
      width: 20px;
      height: 20px;
      margin-bottom: 2px;
    }

    .stats-mini {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
      width: 100%;
    }
    .stat-box {
      padding: 24px 16px;
      text-align: center;
    }
    .stat-box span {
      display: block;
      font-size: 1.8rem;
      font-weight: 800;
      color: white;
      font-family: var(--font-heading);
    }
    .stat-box label {
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 4px;
      display: block;
    }
    h2 {
        font-family: var(--font-heading);
        font-weight: 800;
        letter-spacing: -0.02em;
        margin-bottom: 16px;
    }
  </style>
</head>

<body>
  <!-- ═══ App Shell ═══ -->
  <div id="app">

    <!-- ─── Header ─── -->
    <header id="app-header" class="header hidden">
      <div class="header-left">
        <div class="logo">
          <span class="logo-icon">🐔</span>
          <span class="logo-text">Restaurantes</span>
        </div>
      </div>
      <div class="header-center">
        <span id="restaurant-badge" class="restaurant-badge">
          <span id="restaurant-name">—</span>
        </span>
      </div>
      <div class="header-right">
        <button id="btn-logout-header" class="btn-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </header>

    <!-- ─── Login View ─── -->

    <!-- ─── Login View ─── -->
    <section id="view-login" class="view">
      <div class="login-container">
        <div class="login-hero">
          <h1>Restaurantes</h1>
          <p>Sistema de Canje</p>
        </div>
        <form id="login-form">
          <div class="input-group">
            <label>Usuario</label>
            <input type="text" id="login-user" required>
          </div>
          <div class="input-group">
            <label>Contraseña</label>
            <input type="password" id="login-pass" required>
          </div>
          <button type="submit" id="btn-login" class="btn btn-primary btn-block">Iniciar Sesión</button>
          <p id="login-error" class="error-msg hidden"></p>
        </form>
      </div>
    </section>

    <!-- ─── Scanner View ─── -->
    <section id="view-scanner" class="view">
      <div class="scanner-container" style="padding-top: 40px;">
        <h2 class="premium-gradient-text text-center" style="font-size: 2rem;">Escanear Vale</h2>
        <div id="scanner-box" class="scanner-box" style="border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.3);">
          <div id="qr-reader" class="qr-reader"></div>
          <div class="scanner-overlay">
            <div class="scanner-corners"></div>
          </div>
        </div>
        <div class="manual-input-group mt-20" style="display: flex; flex-direction: column; gap: 12px; margin-top: 32px;">
          <input type="text" id="manual-code" class="premium-input" placeholder="O ingrese código manual..." style="text-align: center;">
          <button id="btn-manual-validate" class="premium-btn">Validar Código</button>
        </div>
      </div>
    </section>

    <!-- ─── Cuadre View ─── -->
    <section id="view-cuadre" class="view">
      <div class="container py-20" style="width: 100%; max-width: 500px; padding: 24px;">
        <h2 class="premium-gradient-text">Mi Cuadre Diario</h2>
        <div class="stats-mini">
          <div class="stat-box glass-card">
            <span id="cuadre-count">0</span>
            <label>Canjes Hoy</label>
          </div>
          <div class="stat-box glass-card">
            <span id="cuadre-total">$0.00</span>
            <label>Monto Total</label>
          </div>
        </div>
        <div id="cuadre-history" class="history-list">
          <!-- Items injected here -->
        </div>
      </div>
    </section>

    <!-- ─── Voucher Detail View ─── -->
    <section id="view-voucher" class="view">
      <div class="voucher-container" style="padding-top: 40px;">
        <div class="glass-card voucher-card" style="padding: 32px;">
          <h3 id="voucher-company" style="font-family: var(--font-heading); font-weight: 700; color: rgba(255,255,255,0.6); margin-bottom: 16px;">Empresa</h3>
          <div class="stat-block">
            <label style="font-size: 0.7rem; letter-spacing: 0.1em; color: rgba(255,255,255,0.4);">SALDO DISPONIBLE</label>
            <h2 id="voucher-balance" style="font-size: 3rem; margin: 8px 0; color: var(--premium-accent);">$0.00</h2>
          </div>
          <p style="font-size: 0.85rem; color: rgba(255,255,255,0.5);">Vence: <span id="voucher-expiry" style="color: white; font-weight: 600;">—</span></p>
        </div>
        <div class="redeem-section mt-20" style="display: flex; flex-direction: column; gap: 16px; margin-top: 32px;">
          <div class="input-group">
            <label style="font-size: 0.75rem; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 8px; display: block;">Monto a Canjear</label>
            <input type="number" id="redeem-amount" step="0.01" class="premium-input" style="font-size: 1.5rem; text-align: center; font-weight: 700;">
          </div>
          <button id="btn-redeem" class="premium-btn" style="height: 64px; font-size: 1.2rem;">CONFIRMAR CANJE</button>
          <button id="btn-cancel-voucher" class="btn btn-ghost" style="margin-top: 8px;">Volver al Escáner</button>
        </div>
      </div>
    </section>

    <!-- ─── Result View ─── -->
    <section id="view-result" class="view">
      <div class="result-container text-center" style="padding-top: 60px; max-width: 400px;">
        <div class="result-icon success" style="width: 80px; height: 80px; background: #2e7d32; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; color: white; margin: 0 auto 24px;">✓</div>
        <h2 class="premium-gradient-text" style="font-size: 2.2rem;">¡Canje Exitoso!</h2>
        <div class="glass-card my-20" style="padding: 24px; margin: 32px 0;">
          <p style="color: rgba(255,255,255,0.5); font-size: 0.9rem;">Monto Canjeado:</p>
          <div id="result-amount" style="font-size: 2.5rem; font-weight: 800; margin: 8px 0;">$0.00</div>
          <p style="color: rgba(255,255,255,0.3); font-size: 0.8rem; margin-top: 12px;">Ticket: <span id="result-invoice" style="color: rgba(255,255,255,0.6);">—</span></p>
        </div>
        <button id="btn-new-scan" class="premium-btn" style="width: 100%;">Nuevo Escaneo</button>
      </div>
    </section>

    <!-- Bottom Nav (Hidden by default) -->
    <nav id="bottom-nav" class="nav-bar hidden">
      <button class="nav-item active" data-view="scanner">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        <span>Escanear</span>
      </button>
      <button class="nav-item" data-view="cuadre">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <span>Cuadre</span>
      </button>
    </nav>

  </div>

  <!-- Confirm Modal -->
  <div id="confirm-modal" class="modal-overlay hidden">
    <div class="glass-card login-modal-content" style="padding: 40px;">
      <h3 style="font-family: var(--font-heading); font-weight: 800; font-size: 1.5rem; margin-bottom: 8px;">Confirmar Canje</h3>
      <div id="confirm-body" style="color: rgba(255,255,255,0.6); font-size: 0.95rem; line-height: 1.5; margin-bottom: 24px;"></div>
      <div class="input-group mb-10">
        <label style="font-size: 0.7rem; color: rgba(255,255,255,0.4); text-transform: uppercase; margin-bottom: 8px; display: block;">Número de Ticket / Factura</label>
        <input type="text" id="invoice-number" class="premium-input" placeholder="Ej: 123456" style="width: 100%;">
      </div>
      <div class="confirm-actions" style="display: flex; flex-direction: column; gap: 12px; margin-top: 32px;">
        <button id="btn-confirm-ok" class="premium-btn">CONFIRMAR AHORA</button>
        <button id="btn-confirm-cancel" class="btn btn-ghost">Cancelar</button>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="/js/app.js?v=1.0.2"></script>
</body>

</html>
